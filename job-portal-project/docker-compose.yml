services:
  db:
    image: mysql:8.0
    container_name: job_portal_db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: admin123
      MYSQL_DATABASE: job_portal_db
    ports:
      - "3307:3306"
    volumes:
      - db_data:/var/lib/mysql
    networks:
      - job_network

  backend:
    build: ./backend
    container_name: job_portal_backend
    restart: unless-stopped
    environment:
      PORT: 5005
      JWT_SECRET: bebasapasaja123
      DB_HOST: db
      DB_USER: root
      DB_PASSWORD: admin123
      DB_DATABASE: job_portal_db
      DB_PORT: 3306
    ports:
      - "5006:5005"                 # port 5006 di host untuk akses dari luar
    depends_on:
      - db
    networks:
      - job_network
    volumes:
      - ./backend/uploads:/app/uploads

  frontend:
    build: ./frontend
    container_name: job_portal_frontend
    restart: unless-stopped
    ports:
      - "3005:80"                   # frontend di port 3005
    depends_on:
      - backend
    networks:
      - job_network
    # environment variabel untuk build (optional, bisa juga diatur di Dockerfile)
    environment:
      - REACT_APP_API_URL=http://localhost:5006/api   # akan di-override oleh build arg

volumes:
  db_data:

networks:
  job_network:
    driver: bridge